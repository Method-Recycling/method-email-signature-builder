<!DOCTYPE html>
<html lang="en" class="theme-light">
<head>

</head>
<body>
<!-- partial:index.partial.html -->

    <div class="heading">
      <h1 class="title">Generate your Method email signature</h1>

</section>
<section class="section">
  <div class="container">
    <div class="columns">
      <!-- LEFT COLUMN -->
      <div class="column form-pane is-5">
        <h3 class="title">Your information</h3>
        <!-- START FORM -->
        <form id="form">
          <div class="form-section">
          <!-- NAME AND PRONOUNS ROW -->
          <div class="columns">
            <div class="column is-8">
              <!-- NAME -->
              <div class="field">
                <label class="label" for="name">Name*</label>
                <div class="field has-addons has-addons-centered">
                  <p class="control is-expanded has-icons-left">
                    <input id="name" class="input" placeholder="First & Last Name" required>
                    <span class="icon is-small is-left"><i class="fas fa-user"></i></span>
                  </p>
                </div>
              </div>
            </div>
            <div class="column is-4">
              <!-- PRONOUNS -->
              <div class="field">
                <label class="label" for="checkPronouns">Pronouns</label>
                <div class="field has-addons has-addons-centered">
                  <p class="control">
                    <label class="button" title="Show pronouns">
                      <input id="checkPronouns" type="checkbox">
                    </label>
                  </p>
                  <p class="control is-expanded has-icons-left">
                    <input id="pronouns" class="input" placeholder="she/her, he/him, ia, etc." disabled>
                    <span class="icon is-small is-left"><i class="fas fa-mars-and-venus-burst"></i></span>
                  </p>
                </div>
              </div>
            </div>
          </div>

          <!-- POSITION AND JOB LINE 2 ROW -->
          <div class="columns">
            <div class="column is-6">
              <!-- POSITION -->
              <div class="field">
                <label class="label" for="jobtitle">Position*</label>
                <div class="field has-addons has-addons-centered">
                  <p class="control is-expanded has-icons-left">
                    <input id="jobtitle" class="input" placeholder="This is what I do" required>
                    <span class="icon is-small is-left"><i class="fas fa-id-badge"></i></span>
                  </p>
                </div>
              </div>
            </div>
            <div class="column is-6">
              <!-- JOB LINE 2 -->
              <div class="field">
                <label class="label" for="department">Job line 2</label>
                <div class="field has-addons has-addons-centered">
                  <p class="control">
                    <label class="button" title="Use 2nd job line">
                      <input id="check2ndJob" type="checkbox">
                    </label>
                  </p>
                  <p class="control is-expanded has-icons-left">
                    <input id="department" class="input" placeholder="This is my team" disabled>
                    <span class="icon is-small is-left"><i class="fas fa-user-group"></i></span>
                  </p>
                </div>
              </div>
            </div>
          </div>

          </div>

          <div class="form-section">
          <!-- MOBILE AND EMAIL ROW -->
          <div class="columns">
            <div class="column is-6">
              <!-- MOBILE -->
              <div class="field">
                <label class="label" for="checkPhone">Mobile</label>
                <div class="field has-addons has-addons-centered">
                  <p class="control">
                    <label class="button" title="Show Mobile number">
                      <input id="checkPhone" type="checkbox" checked>
                    </label>
                  </p>
                  <p class="control is-expanded has-icons-left">
                    <input type="tel" id="phone" class="input" placeholder="+64 xx xxx xxxx">
                    <span class="icon is-small is-left"><i class="fas fa-mobile"></i></span>
                  </p>
                </div>
              </div>
              <!-- MOBILE 2 -->
              <div class="field">
                <label class="label" for="checkPhone2">Mobile 2</label>
                <div class="field has-addons has-addons-centered">
                  <p class="control">
                    <label class="button" title="Show second Mobile number">
                      <input id="checkPhone2" type="checkbox">
                    </label>
                  </p>
                  <p class="control is-expanded has-icons-left">
                    <input type="tel" id="phone2" class="input" placeholder="+64 xx xxx xxxx" disabled>
                    <span class="icon is-small is-left"><i class="fas fa-mobile"></i></span>
                  </p>
                </div>
              </div>
            </div>
            <div class="column is-6">
              <!-- EMAIL -->
              <div class="field">
                <label class="label" for="email">Email*</label>
                <div class="field has-addons has-addons-centered">
                  <p class="control is-expanded has-icons-left">
                    <input type="email" id="email" class="input" placeholder="yourname@methodrecycling.com" required>
                    <span class="icon is-small is-left"><i class="fas fa-envelope"></i></span>
                  </p>
                </div>
              </div>
            </div>
          </div>

          <!-- TEAMS INFO -->
          <div class="field">
            <label class="label" for="checkTeams">Meeting Link</label>
            <div class="field has-addons has-addons-centered">
              <p class="control">
                <label class="button" title="Show a 'Book a meeting with me' link">
                  <input id="checkTeams" type="checkbox">
                </label>
              </p>
              <p class="control is-expanded has-icons-left">
                <input type="url" id="meetingUrl" class="input" placeholder="https://meetings.hubspot.com/yourname/30min">
                <span class="icon is-small is-left"><i class="fas fa-video"></i></span>
              </p>
            </div>
            <p class="help">Add your personal meeting URL from Hubspot</p>
          </div>

          <!-- ADDITIONAL INFO -->
          <div class="field">
            <label class="label" for="checkAdditional">Additional Info</label>
            <div class="field has-addons has-addons-centered">
              <p class="control">
                <label class="button" title="Enable Additional Information">
                  <input id="checkAdditional" type="checkbox">
                </label>
              </p>
              <p class="control is-expanded">
                <input id="additional" class="input" placeholder="Example: Work Locations, Hours: 9am–5pm, Mon–Fri" disabled>
              </p>
            </div>
            <div class="format-buttons">
              <button type="button" class="format-btn" data-wrap="b" title="Bold selection" disabled><b>B</b></button>
              <button type="button" class="format-btn format-btn-italic" data-wrap="i" title="Italicise selection" disabled><i>I</i></button>
              <span class="format-hint">Select text, then click B or I</span>
            </div>
          </div>

          </div>

          <div class="form-section">
          <!-- BANNER -->
          <div class="field">
            <label class="label" for="checkImage">Banner</label>
            <div class="field has-addons has-addons-centered">
              <div class="control is-expanded has-icons-left">
                <div class="select">
                  <select id="image" class="input" name="Banners" title="Use campaign banners">
                    <option value="None">None - click to choose</option>
                    <option value="banner-01" selected>Banner 01</option>
                    <option value="banner-02">Banner 02</option>
                    <option value="banner-03">Banner 03</option>
                    <option value="banner-04">Banner 04</option>
                    <option value="banner-05">Banner 05</option>
                  </select>
                </div>
                <div class="icon is-small is-left">
                  <i class="fas fa-image"></i>
                </div>
              </div>
            </div>
          </div>
          </div>
        </form>
        <!-- END FORM -->
      </div>

      <!-- RIGHT COLUMN -->
      <div class="column preview-pane is-7">
        <h3 class="title">Live Preview</h3>
        <!-- START PREVIEW -->
        <article class="message is-dark">
          <div class="message-body" id="signature_container">
            <table cellspacing="0" id="signature" style="border-spacing: 0; border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; mso-line-height-rule:exactly;" width="100%">
              <tbody>
                <!-- Person and job lines -->
                <tr class="row-person">
                  <td style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; vertical-align: top; padding: 0px 0px 10px 0px;">
                    <b><span class="name" id="editName" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 11pt; font-feature-settings: 'kern' 1, 'liga' 1;">Firstname Lastname</span></b><span id="editPronouns" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-style: italic; font-feature-settings: 'kern' 1, 'liga' 1; color: #333333"></span><br>
                    <!-- Job Titles -->
                    <span class="jobtitle" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1;"><b>Job title</b></span><span id="jobSep"></span><span class="department" id="editJobline" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1;"></span>
                  </td>
                </tr>
                <!-- Contact details -->
                <tr class="row-call">
                  <td style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; vertical-align: top;">
                    <div id="deetsWrap" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1;">
                      <span id="mobileLabel"><b>Mob: </b></span><a id="mobileWrap" href="tel:" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; text-decoration-line: underline; color: #000000; text-decoration-color: #000000;"><span class="phone">+64 2x xxx xxxx</span></a>
                      <span id="mobile2Label"></span><a id="mobile2Wrap" href="tel:" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; text-decoration-line: underline; color: #000000; text-decoration-color: #000000;"><span class="phone2"></span></a>
                      <span id="numberSplit" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1;">&ensp;|&ensp;</span>
                      <a href="#" id="teamsWrap" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; color: #000000; text-decoration-color: #000000;">Book&nbsp;a&nbsp;Meeting&nbsp;With&nbsp;Me</a>
                    </div>
                  </td>
                </tr>
                <tr class="row-email">
                  <td style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; vertical-align: top; padding: 0px 0px 10px 0px;">
                    <a class="email" href="mailto:yourname@methodrecycling.com" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; text-decoration-line: underline; color: #000000; text-decoration-color: #000000;">yourname@methodrecycling.com</a>
                  </td>
                </tr>
                <!-- Additional info -->
                <tr class="row-info">
                  <td style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; vertical-align: top;">
                    <div class="additional" id="editAdditional" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; padding: 0px 0px 10px 0px;"></div>
                  </td>
                </tr>
                <!-- Website -->
                <tr class="row-website">
                  <td style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; vertical-align: top; padding: 0px 0px 10px 0px;">
                    <b><a href="https://www.methodrecycling.com" style="font-family: Aptos, Helvetica Neue, Arial, sans-serif; font-size: 10pt; font-feature-settings: 'kern' 1, 'liga' 1; color: #000000; text-decoration-color: #000000;">methodrecycling.com</a></b>
                  </td>
                </tr>
                <!-- Banner -->
                <tr>
                  <td>
                    <div id="imageWrap" style="padding: 0px 0px 0px 0px;"></div>
                  </td>
                </tr>
                <!-- Social Icons row -->
                <tr class="row-social">
                  <td style="padding: 10px 0px 0px 0px;">
                    <table cellspacing="0" style="border-spacing: 0; border-collapse: collapse;"><tr>
                      <td style="padding-right: 6px;"><a href="https://www.instagram.com/methodrecycling/" target="_blank" style="text-decoration: none;"><img src="https://raw.githubusercontent.com/Method-Recycling/method-email-signature-builder/main/dist/images/instagram.png" alt="Instagram" width="24" height="24" style="display:block;width:24px;height:24px;border:0;"></a></td>
                      <td style="padding-right: 6px;"><a href="https://www.facebook.com/methodrecycling" target="_blank" style="text-decoration: none;"><img src="https://raw.githubusercontent.com/Method-Recycling/method-email-signature-builder/main/dist/images/facebook.png" alt="Facebook" width="24" height="24" style="display:block;width:24px;height:24px;border:0;"></a></td>
                      <td style="padding-right: 6px;"><a href="https://www.youtube.com/channel/UC_yUgZz5JCO0VJjMUbk70Kw" target="_blank" style="text-decoration: none;"><img src="https://raw.githubusercontent.com/Method-Recycling/method-email-signature-builder/main/dist/images/youtube.png" alt="YouTube" width="24" height="24" style="display:block;width:24px;height:24px;border:0;"></a></td>
                      <td><a href="https://nz.linkedin.com/company/methodrecycling" target="_blank" style="text-decoration: none;"><img src="https://raw.githubusercontent.com/Method-Recycling/method-email-signature-builder/main/dist/images/linkedin.png" alt="LinkedIn" width="24" height="24" style="display:block;width:24px;height:24px;border:0;"></a></td>
                    </tr></table>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>
        <!-- END OF PREVIEW -->

        <!-- Copy signature button -->
        <div class="controls mb-5">
          <button class="custom-button" data-select data-signature="signature">
            <span class="icon is-small">
              <img src="images/gmail.svg" alt="Gmail icon" width="16" height="16">
            </span>
            <span>Copy Gmail Signature</span>
          </button>
        </div>

        <!-- NEW CODE PREVIEW SECTION -->
        <h3 class="title">Code Preview</h3>
        <article class="message is-dark">
          <div class="message-body">
            <pre><code id="code_preview" style="white-space: pre-wrap; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto;"></code></pre>
          </div>
        </article>
        
        <div class="controls">
          <button class="custom-button" data-select data-signature="signature_container">
            <span class="icon is-small">
              <img src="images/hubspot.svg" alt="Hubspot icon" width="16" height="16">
            </span>
            <span>Copy Hubspot Signature</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>


<!-- partial -->
<script src="./script.js"></script>
</body>
</html>
